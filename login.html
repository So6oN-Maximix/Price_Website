<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion - PRICE</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <a href="/" class="back-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
            </svg>
            Retour
        </a>

        <div class="login-container">
            <form class="glass-login" id="loginForm" action="/api/login" method="POST">
                <svg class="login-logo" width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <h2>Connexion</h2>
                <p>Bienvenue dans l'expérience.</p>
                <div class="input-group">
                    <input type="email" id="email" name="email" required>
                    <label for="email">Adresse Email</label>
                </div>
                <div class="input-group">
                    <input type="password" id="password" name="password" required>
                    <label for="password">Mot de passe</label>
                </div>
                
                <button type="submit" class="glass-btn">Se connecter</button>
                
                <div class="login-links">
                    <a href="/profile">Mot de passe oublié ?</a>
                    <a href="/register">Créer un compte</a>
                </div>
            </form>
        </div>
        <footer>
            <span>Copyright © 2026 LEOST Maxime</span>
        </footer>
    </body>
</html>
