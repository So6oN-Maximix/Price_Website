<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Boutique - Polaris</title>
        <link rel="stylesheet" href="style.css">
        <script src="profile.js" defer></script>
        <script src="shop.js" defer></script>
    </head>
    <body>
        <header>
            <nav class="glass-nav">
                <a href="/shop" class="active">Boutique</a>
                <a href="#">Personalisation</a>
                <a href="/" class="logo-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </a>
                <a href="#">Communauté</a>
                <a href="#">A propos de nous</a>
                <a href="/login" class="logo-link" id="nav-cart-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </a>
                <a href="/login" class="logo-link" id="nav-profile-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </a>
            </nav>
        </header>

        <div class="search-container">
            <div class="search-group">
                <input type="text" id="search" required>
                <label for="search">Rechercher un produit</label>
                <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>

        <div class="shop-container">
            <aside class="shop-sidebar glass-card">
                <h3>Filtres</h3>
                <div class="filter-group">
                    <h4>Catégories</h4>
                    <label class="glass-check"><input type="checkbox"> <span>Bouchon</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Corps</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Habillage</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Socle</span></label>
                </div>
                <div class="filter-group">
                    <h4>Prix</h4>
                    <input type="range" class="glass-range" min="0" max="1000">
                </div>
            </aside>

            <main class="products-grid" id="products-grid">

            </main>
        </div>
        <footer>
            <span>Copyright © 2026 LEOST Maxime</span>
        </footer>
    </body>
</html>
