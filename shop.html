<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <title>Boutique - Polaris</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header>
            <nav class="glass-nav">
                <a href="shop.html" class="active">Boutique</a>
                <a href="#">Personalisation</a>
                <a href="index.html" class="logo-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </a>
                <a href="#">Communauté</a>
                <a href="#">A propos de nous</a>
                <a href="login.html" class="account-logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </a>
            </nav>
        </header>

        <div class="shop-container">
            <aside class="shop-sidebar glass-card">
                <h3>Filtres</h3>
                <div class="filter-group">
                    <h4>Catégories</h4>
                    <label class="glass-check"><input type="checkbox"> <span>Bouchon</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Corps</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Habillage</span></label>
                    <label class="glass-check"><input type="checkbox"> <span>Socle</span></label>
                </div>
                <div class="filter-group">
                    <h4>Prix</h4>
                    <input type="range" class="glass-range" min="0" max="1000">
                </div>
            </aside>

            <main class="products-grid">
                <div class="product-card glass-card">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 01</h4>
                        <span class="price">29.56€</span>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="badge-promo">-20%</div>
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 02</h4>
                        <div class="price-container">
                            <span class="old-price">80.49€</span> <span class="price">64.39€</span>
                        </div>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 03</h4>
                        <span class="price">27.96€</span>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 04</h4>
                        <span class="price">21.02€</span>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 05</h4>
                        <span class="price">54.04€</span>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 06</h4>
                        <span class="price">72.30€</span>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>

                <div class="product-card glass-card">
                    <div class="badge-promo">-50%</div>
                    <div class="product-img">
                        <img src="https://via.placeholder.com/200" alt="Produit">
                    </div>
                    <div class="product-info">
                        <h4>Produit 07</h4>
                        <div class="price-container">
                            <span class="old-price">25.28€</span> <span class="price">12.64€</span>
                        </div>
                        <button class="add-to-cart">+</button>
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
