<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Communauté - PRICE</title>
        <link rel="stylesheet" href="style.css">
        <script src="profile.js"></script>
        <script src="community.js"></script>
    </head>
    <body class="community-body">
        <header>
            <nav class="glass-nav">
                <a href="/shop">Boutique</a>
                <a href="/custom">Personalisation</a>
                <a href="/" class="logo-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">

                    </svg>
                </a>
                <a href="/community" class="active">Communauté</a>
                <a href="#">A propos de nous</a>
                <a href="/login" class="logo-link" id="nav-cart-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </a>
                <a href="/login" class="logo-link" id="nav-profile-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </a>
            </nav>
        </header>

        <main class="community-main-container" id="community-main-container">
            <div class="community-header">
                <h1>Inspis de la Commu</h1>
                <p>Découvrez les assemblages de la communauté et proposez vos idées.</p>
            </div>
            <div class="community-feed" id="community-feed">
                <p style="text-align: center; color: rgba(255, 255, 255, 0.6);">Pas de commentaires postés pour le moment, soyez le premier !!</p>
            </div>
        </main>
        <div class="community-bottom-toggle glass-card">
            <button class="toggle-mode-btn active" id="btn-compositions">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 21H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v7"></path><path d="M14.5 18a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path><path d="M22 22l-1.5-1.5"></path></svg>
                Compositions
            </button>
            <button class="toggle-mode-btn" id="btn-creations">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                Créations (Idées)
            </button>
        </div>
        <footer>
            <span>Copyright © 2026 LEOST Maxime</span>
        </footer>
