<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mot de passe oublié - PRICE</title>
        <link rel="stylesheet" href="/css/style.css">
    </head>
    <body class="login-body">
        <div class="login-container">
            <form class="glass-login" id="forgotPwdForm">
                <svg class="login-logo" width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                
                <h2>Mot de passe oublié</h2>
                <p>Entre ton adresse e-mail pour réinitialiser.</p>
                
                <div class="input-group">
                    <input type="email" id="email" name="email" required>
                    <label for="email">Adresse Email</label>
                </div>

                <div id="success-msg" class="success-message">
                    Si cette adresse existe, un e-mail vient de t'être envoyé !
                </div>
                <div id="error-msg" class="error-message" style="margin-top: 10px;">
                    Une erreur est survenue lors de l'envoi.
                </div>
                
                <button type="submit" class="glass-btn" id="submit-btn">Envoyer le lien</button>
                
                <div class="login-links" style="justify-content: center; margin-top: 10px;">
                    <a href="/login">← Retour à la connexion</a>
                </div>
            </form>
        </div>
        <script>
            document.getElementById("forgotPwdForm").addEventListener("submit", async (event) => {
                event.preventDefault();
                const emailInput = document.getElementById("email");
                const successMsg = document.getElementById("success-msg");
                const errorMsg = document.getElementById("error-msg");
                const submitBtn = document.getElementById("submit-btn");

                successMsg.style.display = "none";
                errorMsg.style.display = "none";
                submitBtn.textContent = "Envoi en cours...";
                submitBtn.style.opacity = "0.7";
                submitBtn.disabled = true;

                try {
                    const response = await fetch("/api/forgot-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: emailInput.value })
                    });

                    if (response.ok) {
                        successMsg.style.display = "block";
                        emailInput.value = "";
                    } else {
                        errorMsg.style.display = "block";
                    }
                } catch (error) {
                    console.error("Erreur :", error);
                    errorMsg.style.display = "block";
                } finally {
                    submitBtn.textContent = "Envoyer le lien";
                    submitBtn.style.opacity = "1";
                    submitBtn.disabled = false;
                }
            });
        </script>
    </body>
</html>
