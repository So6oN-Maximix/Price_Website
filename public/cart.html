<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Mon Panier - PRICE</title>
        <link rel="stylesheet" href="/css/style.css" />
        <link rel="icon" type="image/x-icon" href="/assets/Icones/41.ico" />
        <script src="/js/profile.js" defer></script>
        <script src="/js/cart.js" defer></script>
    </head>
    <body>
        <header>
            <nav class="glass-nav">
                <a href="/shop">Boutique</a>
                <a href="/custom" class="on-pc">Personnalisation</a>
                <a href="/" class="logo-link">
                    <img src="/assets/Icones/41.png" alt="Logo 41" style="width: 24px; height: 24px; display: block" />
                </a>
                <a href="/community">Communauté</a>
                <a href="/about-us">A propos</a>
                <a href="/cart" class="logo-link on-pc active" id="nav-cart-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"
                        />
                    </svg>
                </a>
                <a href="/login" class="logo-link on-pc" id="nav-profile-link">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                        />
                    </svg>
                </a>
                <div class="nav-item-dropdown">
                    <a href="#" class="nav-main-link active" onclick="toggleNavMenu(event, 'gear-dropdown')">
                        <svg class="nav-icon" width="24" height="24" viewBox="0 0 24 24" fill="white">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                            />
                        </svg>
                    </a>

                    <div id="gear-dropdown" class="nav-dropdown-menu">
                        <a href="/custom">Personnaliser</a>
                        <a href="/cart">Mon Panier</a>
                        <a href="/profile">Mon Compte</a>
                    </div>
                </div>
            </nav>
        </header>

        <main class="cart-container">
            <section class="cart-items-section">
                <h2 class="cart-title">
                    Mon Panier <span>(<span id="nbr-articles">0</span> <span id="article">articles</span>)</span>
                </h2>

                <div class="cart-list" id="cart-list"></div>
            </section>

            <aside class="cart-summary-section">
                <div class="summary-card glass-card">
                    <h2>Résumé de la commande</h2>

                    <div class="promo-code-group">
                        <input type="text" placeholder="Code promo" />
                        <button>Appliquer</button>
                    </div>

                    <div class="summary-details">
                        <div class="summary-row">
                            <span>Sous-total</span>
                            <span><span id="all-product-price">0.00</span>€</span>
                        </div>
                        <div class="summary-row">
                            <span>Livraison estimée</span>
                            <span><span id="delivery-price">0.00</span>€</span>
                        </div>
                        <div class="summary-divider"></div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span><span id="total-price">0.00</span>€</span>
                        </div>
                    </div>

                    <button class="checkout-btn glass-btn" id="paiement-btn">Procéder au paiement</button>

                    <div class="secure-payment">
                        <svg
                            width="16"
                            height="16"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                        >
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Paiement 100% sécurisé
                    </div>
                </div>
            </aside>
        </main>

        <footer>
            <span>Copyright © 2026 LEOST Maxime</span>
        </footer>
    </body>
</html>
