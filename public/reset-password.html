<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nouveau mot de passe - PRICE</title>
        <link rel="stylesheet" href="/css/style.css">
        <script src="/js/reset-password.js" defer></script>
    </head>
    <body class="login-body">
        <div class="login-container">
            <form class="glass-login" id="resetPwdForm">
                <svg class="login-logo" width="40" height="40" viewBox="0 0 24 24" fill="white">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                
                <h2>Nouveau mot de passe</h2>
                <p>Choisis un mot de passe fort et sécurisé.</p>
                
                <div class="input-group">
                    <input type="password" id="new-password" name="new-password" required minlength="6">
                    <label for="new-password">Nouveau mot de passe</label>
                </div>

                <div class="input-group">
                    <input type="password" id="confirm-password" name="confirm-password" required minlength="6">
                    <label for="confirm-password">Confirmer le mot de passe</label>
                </div>

                <div id="success-msg" class="success-message">
                    Mot de passe modifié avec succès ! Redirection...
                </div>
                <div id="error-msg" class="error-message" style="margin-top: 10px;">
                    Une erreur est survenue.
                </div>
                
                <button type="submit" id="submit-btn" class="glass-btn">Réinitialiser</button>
            </form>
        </div>
    </body>
</html>
